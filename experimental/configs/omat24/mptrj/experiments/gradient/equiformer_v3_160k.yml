    # max_atoms: 24000
    max_atoms: 12000

  val:
    format: ase_db
    src:
      #- /data/NFS/radish/ylliao/omat24_dataset/mptrj/aselmdb_uncorrected_total_energy_100k
      #- /data/NFS/radish/ylliao/omat24_dataset/salex/val_30k
      - dataset/salex/val_30k
    a2g_args:
      r_energy: True      # already use `uncorrected_total_energy` after pre-processing
      r_forces: True
      r_stress: True


trainer:              equiformer_v3_dens_trainer


logger:
  name:               wandb
  project:            equiformer_v3_mptrj


hide_eval_progressbar: False


evaluation_metrics:
  primary_metric: forces_mae
  metrics:
    energy:
      - mae
      - per_atom_mae
    forces:
      - mae
      - cosine_similarity
    stress:
      - mae


outputs:
  energy:
    level:                system
    property:             energy
  forces:
    level:                atom
    property:             forces
    train_on_free_atoms:  True
    eval_on_free_atoms:   True
  stress:
    level:                system
    property:             stress


loss_functions:
  - energy:
      fn:                 per_atom_mae
      coefficient:        20     # Both paper and checkpoint use 20 instead of 5
  - forces:
      fn:                 l2mae
      coefficient:        20
  - stress:
      fn:                 mae
      coefficient:        5


model:
  name:                         equiformer_v3

  use_pbc:                      True
  use_pbc_single:               True      # Process batch PBC graphs one at a time.
                                          # This argument is set to True when training on MPtrj.
  otf_graph:                    True

  regress_forces:               True
  regress_stress:               True
  direct_prediction:            False
                                      
  max_neighbors:                300
  max_radius:                   6.0
  num_radial_basis:             10
  max_num_elements:             128

  num_layers:                   7
  num_channels:                 128
  attn_hidden_channels:         32
  num_heads:                    8
  attn_alpha_channels:          64
  attn_value_channels:          16
  ffn_hidden_channels:          512
  norm_type:                    'merge_layer_norm'  # ['sep_layer_norm', 'sep_layer_norm_liger']

  lmax:                         4
  mmax:                         2
  attn_grid_resolution_list:    [14,  8]
  ffn_grid_resolution_list:     [14, 14]

  edge_channels:                128
  use_atom_edge_embedding:      True
  use_envelope:                 True
  
  attn_activation:              'sep-merge_gates2_swiglu_mem'      
  use_attn_renorm:              True                
  use_add_merge:                False
  use_rad_l_parametrization:    True
  softcap:                      null
  ffn_activation:               'sep-merge_gates2_swiglu'
  use_grid_mlp:                 True

  use_gate_force_head:          True

  alpha_drop:                   0.0
  attn_mask_rate:               0.0
  attn_weights_drop:            0.0
  value_drop:                   0.0
  drop_path_rate:               0.0
  proj_drop:                    0.0
  ffn_drop:                     0.0

  gradient_checkpointing_block_list:    [0, 0, 0, 0, 0, 0, 0]

  enforce_max_neighbors_strictly:       True

  avg_num_nodes:                1       # Remove the division after sum aggregation over nodes for energy prediction


optim:
  # batch_size:                   8
  batch_size:                   2
  # grad_accumulation_steps:      4
  grad_accumulation_steps:      16
  # eval_batch_size:              8
  eval_batch_size:              2
  load_balancing:               atoms
  num_workers:                  0
  lr_initial:                   0.00005

  optimizer:                    AdamW
  optimizer_params:
    weight_decay:               0.001
    betas:                      [0.9, 0.95]
  scheduler:                    LambdaLR
  scheduler_params:
    lambda_type:                cosine
    warmup_factor:              0.0
    warmup_epochs:              0.1
    lr_min_factor:              0.01

  max_epochs:                   10
  clip_grad_norm:               100
  ema_decay:                    0.999

  eval_every:                   5000
  
  use_denoising_pos:            False
  denoising_pos_params:
    prob:                       0.5
    fixed_noise_std:            True
    std:                        0.025
    corrupt_ratio:              0.5
    num_steps:                  50    # not used
    std_low:                    0.01  # not used
    std_high:                   0.5   # not used
    min_num_atoms:              null
    strict_max_ratio:           0.75
  denoising_pos_coefficient:    10

  use_compile:                  False

  load_pretrained_weights:      models/omat24/equiformer_v3/checkpoints/2026-05-26-13-52-00-mptrj_direct_160k/best_checkpoint_no-energy_block.pt
