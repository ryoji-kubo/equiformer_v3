      # - /mnt/data/projects/yilunliao/datasets/omat24/mptrj/aselmdb_uncorrected_total_energy
      - dataset/mptrj/aselmdb_uncorrected_total_energy_160k
    a2g_args:
      r_energy: True      # already use `uncorrected_total_energy` after pre-processing
      r_forces: True
